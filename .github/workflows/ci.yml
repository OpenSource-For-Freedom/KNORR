name: CI

# Validate every push on ANY branch, plus every PR. A branch cut for a fix,
# a spike, or a release all get the same lint + test gate before they land.
on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:
  workflow_dispatch:

# One in-flight run per branch/PR; a new push cancels the superseded run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # requires-python = ">=3.12"; the pipeline is documented to run cleanly
        # through 3.14, so guard the whole supported range.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test (pytest)
        run: pytest -q
